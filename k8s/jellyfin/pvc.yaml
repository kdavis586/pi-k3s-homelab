---
# PVC for Jellyfin media files (stored on USB drive via local-path-provisioner)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-media
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 100Gi  # ~106G free on 128GB USB flash drive (8.9G pre-existing files)
---
# PVC for Jellyfin config/metadata (smaller, also on USB drive)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
