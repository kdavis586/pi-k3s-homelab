# Generated by: make generate  (source: ansible/group_vars/all.yaml)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  replicas: 1
  # Recreate strategy: Jellyfin cannot run multiple instances sharing the same config volume
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      # Pin to apple-pi — that's where the USB drive is mounted
      nodeSelector:
        kubernetes.io/hostname: apple-pi

      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8096
              name: http
              protocol: TCP
          env:
            - name: JELLYFIN_PublishedServerUrl
              value: "http://jellyfin.local"
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "2"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
          # Liveness probe: restart container if Jellyfin stops responding
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: media
          hostPath:
            path: /mnt/usb-storage/media
            type: DirectoryOrCreate
