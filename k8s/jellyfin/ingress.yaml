---
# Traefik IngressRoute to expose Jellyfin at http://jellyfin.local
# On Mac/iPhone this resolves automatically via mDNS (avahi broadcasts it).
# No /etc/hosts or app needed on Apple devices.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`jellyfin.local`)
      kind: Rule
      services:
        - name: jellyfin
          port: 8096
