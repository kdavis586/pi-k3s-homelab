---
# Traefik IngressRoute to expose Jellyfin at http://jellyfin.local
# Traefik v3 ships with K3s and handles this automatically.
#
# After applying, add this to /etc/hosts on your Mac:
#   192.168.1.100  jellyfin.local
#
# Then access: http://jellyfin.local
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`jellyfin.local`)
      kind: Rule
      services:
        - name: jellyfin
          port: 8096
