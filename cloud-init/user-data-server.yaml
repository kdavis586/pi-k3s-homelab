#cloud-config
# TheBakery (8GB Pi 4) - K3s server node

hostname: TheBakery
manage_etc_hosts: true

# Create the default ubuntu user with SSH key auth
users:
  - name: ubuntu
    groups: [sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh_import_id:
      - gh:kdavis586

# Disable password authentication
ssh_pwauth: false

# Locale and timezone
locale: en_US.UTF-8
timezone: America/Chicago  # Adjust to your timezone (e.g. America/New_York, America/Los_Angeles)

# Update packages on first boot
package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - htop
  - chrony
  - open-iscsi  # For potential future Longhorn use
  - nfs-common  # For potential future NFS use

# Run commands on first boot
runcmd:
  # Enable and start chrony for NTP
  - systemctl enable chrony
  - systemctl start chrony
  # Disable ufw — K3s requires open ports between nodes
  - ufw disable
  # Load required kernel modules for K3s
  - modprobe br_netfilter
  - modprobe overlay
  # Persist kernel modules across reboots
  - echo "br_netfilter" >> /etc/modules-load.d/k3s.conf
  - echo "overlay" >> /etc/modules-load.d/k3s.conf
  # Set required sysctl params for K3s
  - echo "net.bridge.bridge-nf-call-iptables=1" >> /etc/sysctl.d/k3s.conf
  - echo "net.bridge.bridge-nf-call-ip6tables=1" >> /etc/sysctl.d/k3s.conf
  - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.d/k3s.conf
  - sysctl --system

# Signal that cloud-init is done
final_message: "TheBakery cloud-init complete after $UPTIME seconds"
