---
# ─────────────────────────────────────────────────────────────────────────────
# Single source of truth for all node configuration.
# After editing, run:  make generate
# ─────────────────────────────────────────────────────────────────────────────

# GitHub username — SSH public keys are imported from github.com/<github_user>.keys
github_user: kdavis586

# Increment this to force cloud-init to re-run on next boot (change instance-id)
cloud_init_version: 6

# ── Network ──────────────────────────────────────────────────────────────────
gateway_ip: "192.168.1.254"
dns_servers:
  - "192.168.1.254"
  - "8.8.8.8"

# ── Node groups ───────────────────────────────────────────────────────────────
# Label key applied to each node: homelab/node-group
# Used for workload affinity — add new nodes here to include them in a group.

# ── Server node ──────────────────────────────────────────────────────────────
server_hostname: the-bakery
server_ip: "192.168.1.100"
server_node_group: control

# ── Agent nodes ──────────────────────────────────────────────────────────────
agent_nodes:
  - hostname: apple-pi
    ip: "192.168.1.101"
    node_group: workloads
  - hostname: pumpkin-pi
    ip: "192.168.1.102"
    node_group: workloads

# ── Flux CD ───────────────────────────────────────────────────────────────────
flux_version: "v2.4.0"
github_repo: pi-k3s-homelab

# ── Storage ───────────────────────────────────────────────────────────────────
# Node where the USB drive is attached and Jellyfin is pinned
storage_node: apple-pi
usb_device: /dev/sda1
usb_fstype: exfat
usb_mount: /mnt/usb-storage

