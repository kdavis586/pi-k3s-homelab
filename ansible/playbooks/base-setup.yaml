---
# Base system setup for all Pi nodes.
# Run once after cloud-init completes (first boot).
# Usage: ansible-playbook ansible/playbooks/base-setup.yaml
- name: Base setup for all nodes
  hosts: all
  become: true
  tasks:
    - name: Wait for system to be reachable
      ansible.builtin.wait_for_connection:
        timeout: 120

    - name: Wait for cloud-init to complete
      ansible.builtin.shell: timeout 300 cloud-init status --wait || true
      changed_when: false

    - name: Repair any interrupted dpkg transactions
      ansible.builtin.command: dpkg --configure -a
      changed_when: false

    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Ensure required packages are installed
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - htop
          - chrony
          - open-iscsi
          - nfs-common
          - avahi-daemon
          - avahi-utils
        state: present

    # k3s iptables rules intercept loopback port 53 traffic, breaking systemd-resolved's
    # stub listener at 127.0.0.53. Fix: disable the stub and point /etc/resolv.conf at
    # the real upstream DNS IPs directly. This is a documented k3s/Ubuntu prerequisite.
    - name: Ensure resolved.conf.d directory exists
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: "0755"

    - name: Disable systemd-resolved stub listener
      ansible.builtin.copy:
        dest: /etc/systemd/resolved.conf.d/nostub.conf
        mode: "0644"
        content: |
          [Resolve]
          DNSStubListener=no
      notify: Restart systemd-resolved

    - name: Point /etc/resolv.conf at upstream DNS (not stub)
      ansible.builtin.file:
        path: /etc/resolv.conf
        src: /run/systemd/resolve/resolv.conf
        state: link
        force: true
      notify: Restart systemd-resolved

    # Pi-hole runs on this cluster and the router will advertise it as the LAN DNS server
    # via DHCP. If the nodes used DHCP-assigned DNS, a Pi-hole pod restart would be unable
    # to resolve Docker Hub to pull its own image — a chicken-and-egg deadlock. Fix: pin
    # node DNS to external resolvers via a netplan override so DHCP DNS is always ignored.
    - name: Pin node DNS to external resolvers (ignore DHCP-assigned DNS)
      ansible.builtin.copy:
        dest: /etc/netplan/99-dns-override.yaml
        mode: "0600"
        content: |
          network:
            version: 2
            ethernets:
              eth0:
                dhcp4: true
                nameservers:
                  addresses:
                    - 8.8.8.8
                    - 1.1.1.1
      notify: Apply netplan

    - name: Enable and start avahi-daemon (mDNS for .local resolution)
      ansible.builtin.systemd:
        name: avahi-daemon
        enabled: true
        state: started

    - name: Enable and start chrony (NTP)
      ansible.builtin.systemd:
        name: chrony
        enabled: true
        state: started

    - name: Disable ufw (K3s needs open inter-node ports)
      ansible.builtin.systemd:
        name: ufw
        enabled: false
        state: stopped
      ignore_errors: true  # ufw may not be running

    - name: Load br_netfilter kernel module
      community.general.modprobe:
        name: br_netfilter
        state: present

    - name: Load overlay kernel module
      community.general.modprobe:
        name: overlay
        state: present

    - name: Persist kernel modules for K3s across reboots
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k3s.conf
        content: |
          br_netfilter
          overlay
        mode: "0644"

    - name: Set sysctl params required by K3s
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k3s.conf
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables, value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward, value: "1" }

  handlers:
    - name: Restart systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted
        daemon_reload: true

    - name: Apply netplan
      ansible.builtin.command: netplan apply
      changed_when: true

- name: Remove legacy avahi alias services
  hosts: all
  become: true
  tasks:
    - name: Stop and disable avahi-alias-jellyfin if present
      ansible.builtin.systemd:
        name: avahi-alias-jellyfin
        enabled: false
        state: stopped
      failed_when: false
    - name: Stop and disable avahi-alias-pihole if present
      ansible.builtin.systemd:
        name: avahi-alias-pihole
        enabled: false
        state: stopped
      failed_when: false

- name: Mount USB drive on storage node
  hosts: apple-pi
  become: true
  tasks:
    - name: Create USB mount point
      ansible.builtin.file:
        path: "{{ usb_mount }}"
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: Check if USB drive is present
      ansible.builtin.stat:
        path: "{{ usb_device }}"
      register: usb_dev

    - name: Display reminder if USB drive not detected
      ansible.builtin.debug:
        msg: >
          USB drive not detected at {{ usb_device }}. Plug in the drive and re-run
          this playbook, or check device path with 'lsblk'.
      when: not usb_dev.stat.exists

    - name: Get UUID of USB drive partition
      ansible.builtin.command: blkid -s UUID -o value {{ usb_device }}
      register: usb_uuid
      changed_when: false
      when: usb_dev.stat.exists

    - name: Mount USB drive by UUID in fstab (exFAT — uid/gid set at mount time)
      ansible.posix.mount:
        path: "{{ usb_mount }}"
        src: "UUID={{ usb_uuid.stdout }}"
        fstype: "{{ usb_fstype }}"
        opts: defaults,nofail,uid=0,gid=0,umask=000
        state: mounted
      when: usb_dev.stat.exists and usb_uuid.stdout != ""

    - name: Create media directory
      ansible.builtin.file:
        path: "{{ usb_mount }}/media"
        state: directory
        mode: "0777"

    - name: Install Samba
      ansible.builtin.apt:
        name: samba
        state: present

    - name: Configure Samba share for media
      ansible.builtin.copy:
        dest: /etc/samba/smb.conf
        mode: "0644"
        content: |
          [global]
          workgroup = WORKGROUP
          server string = apple-pi media server
          security = user
          map to guest = bad user
          dns proxy = no

          # macOS performance and compatibility
          vfs objects = fruit streams_xattr
          fruit:metadata = stream
          fruit:model = MacSamba
          fruit:posix_rename = yes
          fruit:veto_appledouble = no
          fruit:wipe_intentionally_left_blank_rfork = yes
          fruit:delete_empty_adfiles = yes

          # Network performance
          socket options = TCP_NODELAY IPTOS_LOWDELAY
          read raw = yes
          write raw = yes
          use sendfile = yes
          aio read size = 1
          aio write size = 1
          min receivefile size = 16384
          server min protocol = SMB2

          [media]
          path = {{ usb_mount }}/media
          browseable = yes
          writable = yes
          guest ok = yes
          force user = root
          create mask = 0777
          directory mask = 0777
      notify: Restart Samba

    - name: Enable and start Samba
      ansible.builtin.systemd:
        name: smbd
        enabled: true
        state: started

  handlers:
    - name: Restart Samba
      ansible.builtin.systemd:
        name: smbd
        state: restarted
