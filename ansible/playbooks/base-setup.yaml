---
# Base system setup for all Pi nodes.
# Run once after cloud-init completes (first boot).
# Usage: ansible-playbook ansible/playbooks/base-setup.yaml
- name: Base setup for all nodes
  hosts: all
  become: true
  tasks:
    - name: Wait for system to be reachable
      ansible.builtin.wait_for_connection:
        timeout: 120

    - name: Wait for cloud-init to complete
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      failed_when: false
      timeout: 600

    - name: Repair any interrupted dpkg transactions
      ansible.builtin.command: dpkg --configure -a
      changed_when: false

    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Ensure required packages are installed
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - htop
          - chrony
          - open-iscsi
          - nfs-common
          - avahi-daemon
          - avahi-utils
        state: present

    - name: Enable and start avahi-daemon (mDNS for .local resolution)
      ansible.builtin.systemd:
        name: avahi-daemon
        enabled: true
        state: started

    - name: Enable and start chrony (NTP)
      ansible.builtin.systemd:
        name: chrony
        enabled: true
        state: started

    - name: Disable ufw (K3s needs open inter-node ports)
      ansible.builtin.systemd:
        name: ufw
        enabled: false
        state: stopped
      ignore_errors: true  # ufw may not be running

    - name: Load br_netfilter kernel module
      community.general.modprobe:
        name: br_netfilter
        state: present

    - name: Load overlay kernel module
      community.general.modprobe:
        name: overlay
        state: present

    - name: Persist kernel modules for K3s across reboots
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k3s.conf
        content: |
          br_netfilter
          overlay
        mode: "0644"

    - name: Set sysctl params required by K3s
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k3s.conf
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables, value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward, value: "1" }

- name: Publish jellyfin.local mDNS alias on server node
  hosts: servers
  become: true
  tasks:
    - name: Create avahi alias systemd service for jellyfin.local
      ansible.builtin.copy:
        dest: /etc/systemd/system/avahi-alias-jellyfin.service
        mode: "0644"
        content: |
          [Unit]
          Description=mDNS alias jellyfin.local -> {{ server_ip }}
          After=avahi-daemon.service
          Requires=avahi-daemon.service

          [Service]
          Type=simple
          ExecStart=/usr/bin/avahi-publish --address -R jellyfin.local {{ server_ip }}
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start jellyfin.local mDNS alias
      ansible.builtin.systemd:
        name: avahi-alias-jellyfin
        enabled: true
        state: started
        daemon_reload: true

- name: Mount USB drive on storage node
  hosts: apple-pi
  become: true
  tasks:
    - name: Create USB mount point
      ansible.builtin.file:
        path: "{{ usb_mount }}"
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: Check if USB drive is present
      ansible.builtin.stat:
        path: "{{ usb_device }}"
      register: usb_dev

    - name: Display reminder if USB drive not detected
      ansible.builtin.debug:
        msg: >
          USB drive not detected at {{ usb_device }}. Plug in the drive and re-run
          this playbook, or check device path with 'lsblk'.
      when: not usb_dev.stat.exists

    - name: Get UUID of USB drive partition
      ansible.builtin.command: blkid -s UUID -o value {{ usb_device }}
      register: usb_uuid
      changed_when: false
      when: usb_dev.stat.exists

    - name: Mount USB drive by UUID in fstab (exFAT — uid/gid set at mount time)
      ansible.posix.mount:
        path: "{{ usb_mount }}"
        src: "UUID={{ usb_uuid.stdout }}"
        fstype: "{{ usb_fstype }}"
        opts: defaults,nofail,uid=0,gid=0,umask=000
        state: mounted
      when: usb_dev.stat.exists and usb_uuid.stdout != ""

    - name: Create media directory for Samba share
      ansible.builtin.file:
        path: "{{ usb_mount }}/media"
        state: directory
        mode: "0777"

    - name: Install Samba
      ansible.builtin.apt:
        name: samba
        state: present

    - name: Configure Samba share for media
      ansible.builtin.copy:
        dest: /etc/samba/smb.conf
        mode: "0644"
        content: |
          [global]
          workgroup = WORKGROUP
          server string = apple-pi media server
          security = user
          dns proxy = no

          [media]
          path = {{ usb_mount }}/media
          browseable = yes
          writable = yes
          guest ok = no
          valid users = {{ smb_user }}
          create mask = 0777
          directory mask = 0777
      notify: Restart Samba

    - name: Set Samba password for {{ smb_user }}
      ansible.builtin.shell: >
        (echo "{{ smb_password }}"; echo "{{ smb_password }}") | smbpasswd -a -s {{ smb_user }}
      changed_when: false

    - name: Enable and start Samba
      ansible.builtin.systemd:
        name: smbd
        enabled: true
        state: started

  handlers:
    - name: Restart Samba
      ansible.builtin.systemd:
        name: smbd
        state: restarted
