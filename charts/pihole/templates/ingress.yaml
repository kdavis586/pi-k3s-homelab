apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pihole
  namespace: pihole
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.ingress.host }}`) || Host(`{{ .Values.ingress.ip }}`)
      kind: Rule
      services:
        - name: pihole-web
          port: {{ .Values.service.webPort }}
