apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: pihole
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Recreate required: hostNetwork binds port 53 directly on the host.
  # Rolling update would leave old pod holding port 53 while new pod tries to bind it.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pihole.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pihole.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/custom-dns: {{ include (print $.Template.BasePath "/configmap-custom-dns.yaml") . | sha256sum }}
        checksum/dnsmasq: {{ include (print $.Template.BasePath "/configmap-dnsmasq.yaml") . | sha256sum }}
    spec:
      # hostNetwork required for DHCP — DHCP clients broadcast to 255.255.255.255:67
      # which iptables cannot DNAT (unicast only). Pod must share the host network
      # namespace to receive broadcasts directly on the LAN interface.
      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: {{ .Values.dnsPolicy }}

      nodeSelector:
        kubernetes.io/hostname: {{ .Values.nodeSelector.hostname }}

      volumes:
        - name: custom-dns
          configMap:
            name: pihole-custom-dns
        - name: dnsmasq-custom
          configMap:
            name: pihole-dnsmasq

      containers:
        - name: pihole
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          securityContext:
            capabilities:
              add:
                - NET_ADMIN  # Required for DHCP server
          ports:
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 67
              name: dhcp
              protocol: UDP
            - containerPort: {{ .Values.service.webPort }}
              name: http
              protocol: TCP
          volumeMounts:
            - name: custom-dns
              mountPath: /etc/pihole-custom/custom.list
              subPath: custom.list
            - name: dnsmasq-custom
              mountPath: /etc/dnsmasq.d/99-custom.conf
              subPath: 99-custom.conf
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
