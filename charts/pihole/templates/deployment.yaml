apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: pihole
  labels:
    app: pihole
spec:
  replicas: 1
  # Recreate required: hostNetwork binds port 53 directly on the host.
  # Rolling update would leave old pod holding port 53 while new pod tries to bind it.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      # hostNetwork required for DHCP — DHCP clients broadcast to 255.255.255.255:67
      # which iptables cannot DNAT (unicast only). Pod must share the host network
      # namespace to receive broadcasts directly on the LAN interface.
      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: {{ .Values.dnsPolicy }}

      nodeSelector:
        kubernetes.io/hostname: {{ .Values.nodeSelector.hostname }}

      volumes:
        - name: dbus-socket
          hostPath:
            path: /run/dbus/system_bus_socket
            type: Socket

      containers:
        - name: pihole
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          securityContext:
            capabilities:
              add:
                - NET_ADMIN  # Required for DHCP server
          ports:
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 67
              name: dhcp
              protocol: UDP
            - containerPort: {{ .Values.service.webPort }}
              name: http
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

        - name: mdns-publisher
          # Publishes pihole.local mDNS record via the host's avahi-daemon.
          # hostNetwork: true (on the pod) means this container is on the host network
          # namespace. Mounting the host D-Bus socket lets avahi-publish talk to the
          # avahi-daemon already running on the node.
          image: debian:bookworm-slim
          command:
            - /bin/sh
            - -c
            - "apt-get update -qq && apt-get install -y --no-install-recommends avahi-utils && rm -rf /var/lib/apt/lists/* && exec avahi-publish --address -r {{ .Values.mdns.hostname }} {{ .Values.mdns.ip }}"
          env:
            - name: DBUS_SYSTEM_BUS_ADDRESS
              value: unix:path=/run/dbus/system_bus_socket
          volumeMounts:
            - name: dbus-socket
              mountPath: /run/dbus/system_bus_socket
          resources:
            requests:
              memory: 16Mi
              cpu: 10m
            limits:
              memory: 96Mi
              cpu: 50m
