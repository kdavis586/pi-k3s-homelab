apiVersion: v1
kind: ConfigMap
metadata:
  name: splitwise-sync-script
  namespace: splitwise-sync
  labels:
    {{- include "splitwise-sync.labels" . | nindent 4 }}
data:
  sync.py: |
    #!/usr/bin/env python3
    """
    Plaid → Splitwise daily sync.

    For each configured Plaid access token, calls /transactions/sync to fetch
    yesterday's transactions, then posts a single itemized expense to Splitwise
    covering all transactions across all accounts.

    Dedup: processed transaction IDs are persisted to /data/processed_ids.txt
    so re-runs never double-post.
    """

    import json
    import os
    import sys
    import datetime
    import urllib.request
    import urllib.error

    # ---------------------------------------------------------------------------
    # Config from environment (injected via k8s Secret)
    # ---------------------------------------------------------------------------

    PLAID_CLIENT_ID = os.environ["PLAID_CLIENT_ID"]
    PLAID_SECRET = os.environ["PLAID_SECRET"]
    PLAID_ENV = os.environ.get("PLAID_ENV", "development")  # sandbox | development | production

    SPLITWISE_API_KEY = os.environ["SPLITWISE_API_KEY"]
    SPLITWISE_GROUP_ID = int(os.environ["SPLITWISE_GROUP_ID"])
    # Your Splitwise user ID — needed to set the paid_by split correctly.
    SPLITWISE_USER_ID = int(os.environ["SPLITWISE_USER_ID"])

    PLAID_BASE = {
        "sandbox": "https://sandbox.plaid.com",
        "development": "https://development.plaid.com",
        "production": "https://production.plaid.com",
    }[PLAID_ENV]

    SPLITWISE_BASE = "https://secure.splitwise.com/api/v3.0"

    DEDUP_FILE = "/data/processed_ids.txt"

    EXPENSE_DESCRIPTION = os.environ.get("EXPENSE_DESCRIPTION", "Daily Expenses")

    # Collect all PLAID_ACCESS_TOKEN_N env vars (N = 1, 2, 3, ...)
    ACCESS_TOKENS = []
    n = 1
    while True:
        token = os.environ.get(f"PLAID_ACCESS_TOKEN_{n}")
        if token is None:
            break
        ACCESS_TOKENS.append(token)
        n += 1

    if not ACCESS_TOKENS:
        print("ERROR: No PLAID_ACCESS_TOKEN_N environment variables found.", file=sys.stderr)
        sys.exit(1)

    # ---------------------------------------------------------------------------
    # Helpers
    # ---------------------------------------------------------------------------

    def http_post(url: str, payload: dict, headers: dict) -> dict:
        data = json.dumps(payload).encode()
        req = urllib.request.Request(url, data=data, headers=headers, method="POST")
        try:
            with urllib.request.urlopen(req) as resp:
                return json.loads(resp.read())
        except urllib.error.HTTPError as e:
            body = e.read().decode(errors="replace")
            print(f"HTTP {e.code} from {url}: {body}", file=sys.stderr)
            raise


    def plaid_post(path: str, body: dict) -> dict:
        url = f"{PLAID_BASE}{path}"
        headers = {
            "Content-Type": "application/json",
            "PLAID-CLIENT-ID": PLAID_CLIENT_ID,
            "PLAID-SECRET": PLAID_SECRET,
        }
        return http_post(url, body, headers)


    def splitwise_post(path: str, body: dict) -> dict:
        url = f"{SPLITWISE_BASE}{path}"
        headers = {
            "Content-Type": "application/json",
            "Authorization": f"Bearer {SPLITWISE_API_KEY}",
        }
        return http_post(url, body, headers)


    def load_processed_ids() -> set:
        if not os.path.exists(DEDUP_FILE):
            return set()
        with open(DEDUP_FILE) as f:
            return {line.strip() for line in f if line.strip()}


    def save_processed_ids(ids: set) -> None:
        os.makedirs(os.path.dirname(DEDUP_FILE), exist_ok=True)
        with open(DEDUP_FILE, "w") as f:
            for tid in sorted(ids):
                f.write(tid + "\n")

    # ---------------------------------------------------------------------------
    # Plaid: fetch yesterday's transactions via /transactions/sync
    # ---------------------------------------------------------------------------

    def fetch_yesterday_transactions(access_token: str) -> list:
        """
        Pages through /transactions/sync until has_more is False, then filters
        to transactions dated yesterday.
        """
        yesterday = (datetime.date.today() - datetime.timedelta(days=1)).isoformat()
        all_added = []
        cursor = None

        while True:
            body = {
                "access_token": access_token,
                "client_id": PLAID_CLIENT_ID,
                "secret": PLAID_SECRET,
            }
            if cursor:
                body["cursor"] = cursor

            resp = plaid_post("/transactions/sync", body)
            all_added.extend(resp.get("added", []))
            cursor = resp.get("next_cursor")
            if not resp.get("has_more", False):
                break

        return [t for t in all_added if t.get("date") == yesterday]


    # ---------------------------------------------------------------------------
    # Splitwise: post one expense
    # ---------------------------------------------------------------------------

    def build_expense(transactions: list, description: str) -> dict:
        """
        Aggregates a list of Plaid transactions into a single Splitwise expense.
        The expense description contains an itemized breakdown.
        Split 50/50 between the two members of the group (adjust as needed).
        """
        total = sum(t["amount"] for t in transactions)
        total = round(total, 2)

        # Build itemized note
        lines = []
        for t in transactions:
            name = t.get("merchant_name") or t.get("name", "Unknown")
            amt = t["amount"]
            lines.append(f"  {name}: ${amt:.2f}")
        details = "\n".join(lines)

        # 50/50 split — halves rounded to cents, remainder on first user
        half = round(total / 2, 2)
        other_half = round(total - half, 2)

        return {
            "cost": f"{total:.2f}",
            "description": description,
            "details": details,
            "group_id": SPLITWISE_GROUP_ID,
            "split_equally": False,
            "users__0__user_id": SPLITWISE_USER_ID,
            "users__0__paid_share": f"{total:.2f}",
            "users__0__owed_share": f"{half:.2f}",
            # users__1 (the other group member) — owed_share only, paid nothing
            # Splitwise infers the other member from the group.
            # If you have more than 2 members, add users__1__user_id explicitly.
            "users__1__owed_share": f"{other_half:.2f}",
        }


    # ---------------------------------------------------------------------------
    # Main
    # ---------------------------------------------------------------------------

    def main() -> None:
        processed = load_processed_ids()
        yesterday = (datetime.date.today() - datetime.timedelta(days=1)).isoformat()
        print(f"Fetching transactions for {yesterday} across {len(ACCESS_TOKENS)} item(s)...")

        all_transactions = []
        for i, token in enumerate(ACCESS_TOKENS, start=1):
            print(f"  Item {i}/{len(ACCESS_TOKENS)}: fetching...")
            txns = fetch_yesterday_transactions(token)
            # Filter out already-processed IDs
            new_txns = [t for t in txns if t["transaction_id"] not in processed]
            print(f"    {len(txns)} transaction(s) found, {len(new_txns)} new")
            all_transactions.extend(new_txns)

        if not all_transactions:
            print("No new transactions to post.")
            return

        total = sum(t["amount"] for t in all_transactions)
        print(f"Posting {len(all_transactions)} transaction(s), total ${total:.2f}")

        description = f"{EXPENSE_DESCRIPTION} — {yesterday}"
        expense_body = build_expense(all_transactions, description)
        result = splitwise_post("/create_expense", expense_body)

        if result.get("errors"):
            print(f"ERROR from Splitwise: {result['errors']}", file=sys.stderr)
            sys.exit(1)

        expense_id = result["expenses"][0]["id"]
        print(f"Posted Splitwise expense #{expense_id}: ${total:.2f}")

        # Mark all as processed
        new_ids = {t["transaction_id"] for t in all_transactions}
        processed.update(new_ids)
        save_processed_ids(processed)
        print(f"Saved {len(new_ids)} transaction ID(s) to dedup file.")


    if __name__ == "__main__":
        main()
