---
# This Secret must be created manually before Flux deploys this chart.
# Populate it with the values from Bitwarden before applying:
#
#   kubectl create secret generic splitwise-sync-credentials \
#     --namespace splitwise-sync \
#     --from-literal=PLAID_CLIENT_ID=<value> \
#     --from-literal=PLAID_SECRET=<value> \
#     --from-literal=PLAID_ACCESS_TOKEN_1=<value> \
#     --from-literal=PLAID_ACCESS_TOKEN_2=<value> \
#     --from-literal=PLAID_ACCESS_TOKEN_3=<value> \
#     --from-literal=SPLITWISE_API_KEY=<value> \
#     --from-literal=SPLITWISE_GROUP_ID=<value> \
#     --from-literal=SPLITWISE_USER_ID=<value>
#
# Add or remove PLAID_ACCESS_TOKEN_N entries to match .Values.plaidItemCount.
# The secret is NOT rendered by Helm — this comment block documents the expected shape.
# DO NOT store secret values in values.yaml or version control.
