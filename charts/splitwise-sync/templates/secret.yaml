---
# This Secret must be created manually before Flux deploys this chart.
# Populate it with values from Bitwarden before applying:
#
#   kubectl create secret generic splitwise-sync-credentials \
#     --namespace splitwise-sync \
#     --from-literal=PLAID_CLIENT_ID=<value> \
#     --from-literal=PLAID_SECRET=<value> \
#     --from-literal=PLAID_ENV=development \
#     --from-literal=PLAID_ACCESS_TOKEN_1=<value> \
#     --from-literal=PLAID_ACCESS_TOKEN_2=<value> \
#     --from-literal=PLAID_ACCESS_TOKEN_3=<value> \
#     --from-literal=SPLITWISE_API_KEY=<value> \
#     --from-literal=SPLITWISE_GROUP_ID=<value> \
#     --from-literal=SPLITWISE_USER_ID=<value> \
#     --from-literal=SMTP_HOST=smtp.gmail.com \
#     --from-literal=SMTP_PORT=587 \
#     --from-literal=SMTP_USER=<your-email@gmail.com> \
#     --from-literal=SMTP_PASSWORD=<app-password> \
#     --from-literal=SMTP_FROM=<your-email@gmail.com> \
#     --from-literal=SMTP_TO=<your-email@gmail.com> \
#     --from-literal=REVIEW_URL=http://splitwise-sync.internal
#
# PLAID_ACCESS_TOKEN_2 and _3 are optional — omit if you have fewer items.
# SMTP_PORT defaults to 587 if omitted.
# PLAID_ENV defaults to "development" if omitted.
#
# For Gmail: use an App Password (not your account password).
# Account → Security → 2FA enabled → App passwords → generate one.
#
# The secret is NOT rendered by Helm — this comment documents the shape.
# DO NOT store secret values in values.yaml or version control.
