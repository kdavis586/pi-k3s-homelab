apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: splitwise-sync
  namespace: splitwise-sync
  labels:
    {{- include "splitwise-sync.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        - name: splitwise-sync-webapp
          port: 80
