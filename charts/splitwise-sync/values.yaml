image:
  repository: python
  tag: "3.12-slim"
  pullPolicy: IfNotPresent

# CronJob schedule — daily at 08:00 UTC
schedule: "0 8 * * *"

# Description prefix used in the Splitwise expense title
expenseDescription: "Daily Expenses"

# Web review app
webapp:
  port: 5000
  replicas: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 500m

# CronJob resources
resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
    cpu: 500m

# Traefik IngressRoute
ingress:
  host: splitwise-sync.internal
  # IP of the node where Traefik is reachable (used for Pi-hole DNS — set externally)
  ip: "192.168.1.101"

# PVC for shared state (pending.json + processed_ids.txt).
# Static PV + hostPath + Retain — same pattern as Jellyfin.
data:
  pvcName: splitwise-sync-data
  mountPath: /data

# Pin CronJob + webapp to the storage node (PVC is hostPath-bound to it)
nodeSelector:
  kubernetes.io/hostname: apple-pi
