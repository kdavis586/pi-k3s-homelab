image:
  repository: jellyfin/jellyfin
  tag: latest
  pullPolicy: IfNotPresent

nodeSelector:
  kubernetes.io/hostname: apple-pi

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 6Gi
    cpu: "4"

storage:
  configSize: 5Gi
  mediaHostPath: /mnt/usb-storage/media

publishedServerUrl: "http://jellyfin.home"

ingress:
  hosts:
    - jellyfin.home
    - 192.168.1.101  # apple-pi — where Jellyfin is pinned

