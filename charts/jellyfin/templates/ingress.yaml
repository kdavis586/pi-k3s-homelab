apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  entryPoints:
    - web
  routes:
    - match: {{ $matches := list }}{{ range .Values.ingress.hosts }}{{ $matches = append $matches (printf "Host(`%s`)" .) }}{{ end }}{{ join " || " $matches }}
      kind: Rule
      services:
        - name: jellyfin
          port: 8096
