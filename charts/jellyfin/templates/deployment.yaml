apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  replicas: 1
  # Recreate strategy: Jellyfin cannot run multiple instances sharing the same config volume
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      # Pin to apple-pi — that's where the USB drive is mounted
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}

      containers:
        - name: jellyfin
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8096
              name: http
              protocol: TCP
          env:
            - name: JELLYFIN_PublishedServerUrl
              value: {{ .Values.publishedServerUrl | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
          # Liveness probe: restart container if Jellyfin stops responding
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 30
            periodSeconds: 10

        - name: mdns-publisher
          # Publishes jellyfin.local mDNS via the host's avahi-daemon.
          # Mounts the host D-Bus socket so avahi-publish can talk to the avahi-daemon
          # already running on apple-pi (where this pod is pinned).
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
            - "apk add --no-cache avahi && exec avahi-publish --address -r {{ .Values.mdns.hostname }} {{ .Values.mdns.ip }}"
          env:
            - name: DBUS_SYSTEM_BUS_ADDRESS
              value: unix:path=/run/dbus/system_bus_socket
          volumeMounts:
            - name: dbus-socket
              mountPath: /run/dbus/system_bus_socket
          resources:
            requests:
              memory: 16Mi
              cpu: 10m
            limits:
              memory: 32Mi
              cpu: 50m

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: media
          hostPath:
            path: {{ .Values.storage.mediaHostPath }}
            type: DirectoryOrCreate
        - name: dbus-socket
          hostPath:
            path: /run/dbus/system_bus_socket
            type: Socket
